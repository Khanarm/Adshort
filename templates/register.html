<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Unlock 2 Earn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">
                    🔓 Unlock 2 Earn
                </h3>

                <form>

                    <div class="mb-3">
                        <label>Username</label>
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Enter Username">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input
                            type="email"
                            class="form-control"
                            placeholder="Enter Email">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            class="form-control"
                            placeholder="Enter Password">
                    </div>

                    <button
                        class="btn btn-success w-100">
                        Create Account
                    </button>

                </form>

                <hr>

                <p class="text-center">
                    Already have an account?
                    <a href="/login">
                        Login
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
