<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unlock 2 Earn</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
}

.container-box{
    max-width:420px;
    margin:30px auto;
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.card-box{
    background:#1f2937;
    border-radius:15px;
    padding:20px;
}

.progress{
    height:12px;
    border-radius:20px;
}

.step-text{
    text-align:center;
    margin-top:10px;
    margin-bottom:20px;
    color:#cbd5e1;
}

.watch-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    font-size:18px;
    font-weight:bold;
}

.active-btn{
    background:#0d6efd;
    color:white;
}

.lock-btn{
    background:#374151;
    color:#9ca3af;
}

.complete-btn{
    background:#16a34a;
    color:white;
}

.final-btn{
    display:none;
    width:100%;
    height:60px;
    border:none;
    border-radius:12px;
    background:#229ED9;
    color:white;
    font-size:18px;
    font-weight:bold;
}

.small-text{
    display:block;
    font-size:13px;
    opacity:.9;
}

</style>

</head>

<body>

<div class="container-box">

<div class="logo">
🔓 Unlock 2 Earn
</div>

<div class="card-box">

<div class="progress">

<div id="progressBar"
class="progress-bar"
style="width:20%">
</div>

</div>

<div class="step-text">

Step <span id="step">1</span> of
<span id="total">5</span>

</div>

<button
id="btn1"
class="watch-btn active-btn">

▶ WATCH NOW

</button>

<button
id="btn2"
class="watch-btn lock-btn"
disabled>

🔒 WATCH NOW

</button>

<button
id="btn3"
class="watch-btn lock-btn"
disabled>

🔒 WATCH NOW

</button>

<button
id="btn4"
class="watch-btn lock-btn"
disabled>

🔒 WATCH NOW

</button>

<button
id="btn5"
class="watch-btn lock-btn"
disabled>

🔒 WATCH NOW

</button>

<button
id="finalButton"
class="final-btn">

📨 Telegram

<span class="small-text">

Join Movie Hub

</span>

</button>

</div>

</div>

</body>
</html>
