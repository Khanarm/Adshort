<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Generate Link - Unlock 2 Earn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

    <h3 class="text-center mb-4">
        🔗 Generate Link
    </h3>

    <!-- Selected Plan -->

    <div class="card bg-secondary text-white shadow mb-4">

        <div class="card-body text-center">

            <h5>Selected Plan</h5>

            <h3 id="selectedAds">
                1 Ads
            </h3>

            <p class="mb-0">
                Estimated CPM :
                <strong id="selectedCpm">
                    $0.50
                </strong>
            </p>

        </div>

    </div>

    <!-- Select Plan -->

    <h5 class="mb-3">
        Select Plan
    </h5>

    <div class="row g-2 mb-4">

        {% for i in range(1,11) %}

        <div class="col-6">

            <button
                type="button"
                class="btn btn-outline-primary w-100 plan-btn"
                data-ads="{{ i }}"
                data-cpm="{{ '%.2f'|format(i*0.5) }}">

                <strong>{{ i }} Ads</strong>

                <br>

                <small>
                    CPM ${{ '%.2f'|format(i*0.5) }}
                </small>

            </button>

        </div>

        {% endfor %}

    </div>

    <input
        type="hidden"
        name="ads"
        id="adsInput"
        value="1">

    <input
        type="hidden"
        name="cpm"
        id="cpmInput"
        value="0.50">

    <!-- Generate Form -->

    <form method="POST">

        <input
            type="hidden"
            name="ads"
            id="adsHidden"
            value="1">

        <input
            type="hidden"
            name="cpm"
            id="cpmHidden"
            value="0.50">

        <!-- Platform -->

        <div class="mb-3">

            <label class="form-label">
                Select Platform
            </label>

            <select
                class="form-select"
                name="platform"
                required>

                <option value="">Select Platform</option>

                <option value="telegram">Telegram</option>
                <option value="youtube">YouTube</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="discord">Discord</option>
                <option value="website">Website</option>
                <option value="other">Other</option>

            </select>

        </div>

        <!-- Action Name -->

        <div class="mb-3">

            <label class="form-label">
                Action Name
            </label>

            <input
                type="text"
                name="action_name"
                class="form-control"
                placeholder="Join Movie Hub"
                required>

        </div>

        <!-- Destination URL -->

        <div class="mb-3">

            <label class="form-label">
                Destination URL
            </label>

            <input
                type="url"
                name="destination_url"
                class="form-control"
                placeholder="https://example.com"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success w-100">

            <i class="bi bi-link-45deg"></i>

            Generate Link

        </button>

    </form>

    <!-- Generated Link -->

    {% if short_url %}

    <div class="card bg-success text-white shadow mt-4">

        <div class="card-body text-center">

            <h5>
                ✅ Link Generated
            </h5>

            <input
                type="text"
                class="form-control mt-3"
                value="{{ short_url }}"
                readonly>

            <button
                class="btn btn-light w-100 mt-3 copy-btn"
                data-link="{{ short_url }}">

                <i class="bi bi-clipboard"></i>

                Copy Link

            </button>

        </div>

    </div>

    {% endif %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

    </html>
